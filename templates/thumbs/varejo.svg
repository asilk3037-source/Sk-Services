  <rect x="158" y="480" width="110" height="14" rx="4" fill="#f1f5f9"/>
  <rect x="280" y="480" width="110" height="14" rx="4" fill="#f1f5f9"/>
  <rect x="402" y="480" width="110" height="14" rx="4" fill="#f1f5f9"/>

