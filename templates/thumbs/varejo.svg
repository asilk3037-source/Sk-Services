<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="clip"><rect width="800" height="500"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">

  <!-- Page background -->
  <rect width="800" height="500" fill="#f8fafc"/>

  <!-- Top notification bar -->
  <rect width="800" height="28" fill="#0f172a"/>
  <text x="400" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f97316" text-anchor="middle" font-weight="500">📍 Entrega para todo o Brasil</text>

  <!-- Nav bar -->
  <rect y="28" width="800" height="52" fill="#ffffff"/>
  <rect y="79" width="800" height="1" fill="#e2e8f0"/>
  <!-- SK orange logo box -->
  <rect x="16" y="37" width="38" height="34" rx="9" fill="#f97316"/>
  <text x="35" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">SK</text>
  <!-- Search bar -->
  <rect x="68" y="40" width="546" height="28" rx="14" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="88" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">Buscar produtos...</text>
  <!-- Orange search button -->
  <rect x="586" y="40" width="28" height="28" rx="0 14 14 0" fill="#f97316"/>
  <text x="600" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">🔍</text>
  <!-- Nav icons -->
  <text x="644" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="20">👤</text>
  <text x="688" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="20">🛒</text>
  <text x="732" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="20">☰</text>

  <!-- Hero (dark) -->
  <rect y="80" width="800" height="186" fill="#1e293b"/>
  <circle cx="120" cy="170" r="150" fill="#f97316" opacity="0.05"/>

  <!-- Hero tag -->
  <rect x="36" y="100" width="158" height="22" rx="11" fill="rgba(249,115,22,0.18)" stroke="#f97316" stroke-width="0.8"/>
  <text x="46" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#f97316" font-weight="600" letter-spacing="0.3">Eletrônicos em Oferta</text>

  <!-- Hero H1 -->
  <text x="36" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Tecnologia ao Seu Alcance</text>
  <text x="36" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="700" fill="#f97316">até 30% OFF</text>

  <!-- CTA buttons -->
  <rect x="36" y="186" width="146" height="32" rx="16" fill="#f97316"/>
  <text x="109" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Comprar Agora →</text>
  <rect x="194" y="186" width="116" height="32" rx="16" fill="transparent" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="252" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.75)" text-anchor="middle">Ver Catálogo</text>

  <!-- Hero right: laptop visual -->
  <rect x="540" y="92" width="230" height="166" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(249,115,22,0.18)" stroke-width="1"/>
  <text x="655" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="56" text-anchor="middle">💻</text>
  <rect x="560" y="100" width="90" height="6" rx="3" fill="rgba(249,115,22,0.3)"/>
  <rect x="560" y="112" width="60" height="5" rx="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Carousel dots -->
  <circle cx="383" cy="256" r="5" fill="#f97316"/>
  <circle cx="398" cy="256" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="413" cy="256" r="4" fill="rgba(255,255,255,0.2)"/>

  <!-- ── Benefits 2×2 grid ── -->
  <rect y="266" width="800" height="84" fill="#ffffff"/>
  <rect y="349" width="800" height="1" fill="#e2e8f0"/>
  <!-- dividers -->
  <line x1="400" y1="272" x2="400" y2="344" stroke="#e2e8f0" stroke-width="0.8"/>
  <line x1="40" y1="307" x2="760" y2="307" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Row 1, Col 1: Frete Grátis -->
  <text x="58" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="15">🚚</text>
  <text x="82" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#1e293b">Frete Grátis</text>
  <text x="82" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Acima de R$ 299</text>

  <!-- Row 1, Col 2: Compra Segura -->
  <text x="418" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="15">🛡️</text>
  <text x="442" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#1e293b">Compra Segura</text>
  <text x="442" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">100% protegida</text>

  <!-- Row 2, Col 1: Troca Fácil -->
  <text x="58" y="326" font-family="system-ui,-apple-system,sans-serif" font-size="15">🔄</text>
  <text x="82" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#1e293b">Troca Fácil</text>
  <text x="82" y="337" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Até 30 dias</text>

  <!-- Row 2, Col 2: Suporte 24h (headset) -->
  <text x="418" y="326" font-family="system-ui,-apple-system,sans-serif" font-size="15">🎧</text>
  <text x="442" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#1e293b">Suporte 24h</text>
  <text x="442" y="337" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Sempre disponível</text>

  <!-- ── Categories 4×2 grid ── -->
  <rect y="350" width="800" height="150" fill="#f8fafc"/>
  <text x="36" y="373" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1e293b">Comprar por Categoria</text>
  <text x="764" y="373" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f97316" text-anchor="end">Ver todas →</text>

  <!-- Row 1: 4 categories, centers at x=100, 300, 500, 700 -->
  <!-- Eletrônicos - blue -->
  <rect x="74" y="381" width="52" height="52" rx="12" fill="#3b82f6"/>
  <text x="100" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">💻</text>
  <text x="100" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">Eletrônicos</text>

  <!-- Moda - purple -->
  <rect x="274" y="381" width="52" height="52" rx="12" fill="#8b5cf6"/>
  <text x="300" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">👕</text>
  <text x="300" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">Moda</text>

  <!-- Casa & Jardim - green -->
  <rect x="474" y="381" width="52" height="52" rx="12" fill="#22c55e"/>
  <text x="500" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">🏠</text>
  <text x="500" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">Casa &amp; Jardim</text>

  <!-- Esportes - orange -->
  <rect x="674" y="381" width="52" height="52" rx="12" fill="#f97316"/>
  <text x="700" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">⚽</text>
  <text x="700" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">Esportes</text>

  <!-- Ofertas do Dia hint strip -->
  <rect y="455" width="800" height="45" fill="#ffffff"/>
  <rect y="455" width="800" height="1" fill="#e2e8f0"/>
  <text x="36" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" font-weight="700" fill="#1e293b">🔥 Ofertas do Dia</text>
  <text x="764" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f97316" text-anchor="end">Ver todas →</text>
  <rect x="36" y="485" width="100" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="146" y="485" width="100" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="256" y="485" width="100" height="10" rx="3" fill="#f1f5f9"/>

  </g>
</svg>
